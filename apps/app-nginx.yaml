apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/BuiHongKong/EKS-Docker.git
    targetRevision: HEAD
    path: services/nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
